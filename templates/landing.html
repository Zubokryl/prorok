<body>
    <main class="scene">
        <div class="scene-bg">
            <img src="/prorok/assets/images/IMG-20260607-WA0014.jpg" alt="" class="bg-img" loading="eager">
            <div class="vignette"></div>
        </div>
        <div class="flash"></div>
        <div class="grain"></div>

        <section class="hero">
            <div class="hero-word-cursive word-odin">
                <svg class="writing-svg odin-svg" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <mask id="mask-odin">
                            <path class="write-path path-odin" d="M 20,90 C 120,40 240,140 480,90" fill="none" stroke="white" stroke-width="120" stroke-linecap="round" stroke-linejoin="round" />
                        </mask>
                    </defs>
                    <text x="50%" y="60%" dominant-baseline="central" text-anchor="middle" mask="url(#mask-odin)" class="cursive-text" fill="currentColor">один</text>
                </svg>
            </div>
            <div class="hero-word-video word-nebosvod">
                <svg class="word-svg" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="clip-nebosvod">
                            <text x="50%" y="60%" dominant-baseline="central" text-anchor="middle" font-family="'Archivo Black', 'Arial Black', sans-serif" font-weight="900" font-size="110">НЕБОСВОД</text>
                        </clipPath>
                    </defs>
                    <foreignObject x="0" y="0" width="800" height="160" clip-path="url(#clip-nebosvod)">
                        <video autoplay muted playsinline class="letter-video" style="width: 100%; height: 100%; object-fit: cover;">
                            <source src="/prorok/assets/birds.mp4" type="video/mp4">
                        </video>
                    </foreignObject>
                </svg>
            </div>
            <div class="hero-word-cursive word-mnozhestvo">
                <svg class="writing-svg mnozhestvo-svg" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <mask id="mask-mnozhestvo">
                            <path class="write-path path-mnozhestvo" d="M 20,90 C 200,30 400,150 780,90" fill="none" stroke="white" stroke-width="120" stroke-linecap="round" stroke-linejoin="round" />
                        </mask>
                    </defs>
                    <text x="50%" y="60%" dominant-baseline="central" text-anchor="middle" mask="url(#mask-mnozhestvo)" class="cursive-text" fill="currentColor">множество</text>
                </svg>
            </div>
            <div class="hero-word-video word-dorog">
                <svg class="word-svg" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="clip-dorog">
                            <text x="50%" y="60%" dominant-baseline="central" text-anchor="middle" font-family="'Archivo Black', 'Arial Black', sans-serif" font-weight="900" font-size="110">ДОРОГ</text>
                        </clipPath>
                    </defs>
                    <foreignObject x="0" y="0" width="800" height="160" clip-path="url(#clip-dorog)">
                        <video autoplay muted playsinline class="letter-video" style="width: 100%; height: 100%; object-fit: cover;">
                            <source src="/prorok/assets/grass.mp4" type="video/mp4">
                        </video>
                    </foreignObject>
                </svg>
            </div>
        </section>

        <aside class="symbols">
            <div class="connector"></div>
            <a href="/prorok/christianity/index.html" class="sym s1">
                <span class="glow"></span>
                <span class="ring"></span>
                <span class="label">Христианство</span>
                <svg class="sym-icon" viewBox="0 0 48 48" fill="currentColor" aria-hidden="true">
                    <path d="M21 4h6v14h14v6H27v22h-6V24H7v-6h14V4Z"/>
                </svg>
            </a>
            <a href="/prorok/judaism/index.html" class="sym s2">
                <span class="glow"></span>
                <span class="ring"></span>
                <span class="label">Иудаизм</span>
                <svg class="sym-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round" aria-hidden="true">
                    <path d="M24 4 L42 35 L6 35 Z"/>
                    <path d="M24 44 L6 13 L42 13 Z"/>
                </svg>
            </a>
            <a href="/prorok/islam/index.html" class="sym s3">
                <span class="glow"></span>
                <span class="ring"></span>
                <span class="label">Ислам</span>
                <svg class="sym-icon" viewBox="0 0 48 48" fill="currentColor" aria-hidden="true">
                    <path d="M32 4a20 20 0 1 0 12 35.6A16 16 0 0 1 32 4Z"/>
                    <path d="m38 14 1.4 4L43 19.4 39.4 21 38 25l-1.4-4L33 19.4 36.6 18 38 14Z"/>
                </svg>
            </a>
        </aside>



        {{BOT_BOX}}
    </main>
    <script src="/prorok/assets/js/main.js"></script>
