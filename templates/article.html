<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Пророк</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL}}">
    <link rel="stylesheet" href="/prorok/assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:url" content="{{CANONICAL}}">
    <meta property="og:image" content="https://prorok.site/prorok/assets/images/default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    {{GA_TAG}}
</head>
<body>
    <header>
        <h1>Пророк</h1>
    </header>
    <nav>
        <ul>
            <li><a href="{{BACK_LINK}}">← Назад</a></li>
        </ul>
    </nav>
    <main>
        <article>
            <h2>{{TITLE}}</h2>
            {{CONTENT}}
        </article>
        {{BOT_BOX}}
    </main>
    <footer>
        <p>&copy; {{YEAR}} Пророк. Все права защищены.</p>
    </footer>
    <script src="/prorok/assets/js/main.js"></script>
</body>
</html>
